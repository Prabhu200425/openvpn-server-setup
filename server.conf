# ============================================
# OpenVPN Server Configuration
# Author: Prabhu R
# OS: Pop!_OS Linux
# Date: April 2026
# ============================================

# Server port
port 1194

# Protocol (tcp or udp)
proto tcp

# Virtual network interface
dev tun

# Certificate files
ca ca.crt
cert server.crt
key server.key

# Diffie-Hellman key
dh dh.pem

# TLS authentication key
tls-auth ta.key 0

# VPN subnet
server 10.8.0.0 255.255.255.0

# Push routing & DNS to clients
push "redirect-gateway def1 bypass-dhcp"
push "dhcp-option DNS 8.8.8.8"
push "dhcp-option DNS 8.8.4.4"

# Keep alive
keepalive 10 120

# Encryption cipher
cipher AES-256-CBC

# Run as nobody for security
user nobody
group nogroup

# Persist keys across restarts
persist-key
persist-tun

# Log file
status openvpn-status.log

# Verbosity level (0-9)
verb 3
